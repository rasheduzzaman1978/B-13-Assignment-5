<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- DaisyUI + Tailwindcss -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Font awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <!-- Google font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <title>GitHub Issues Tracker | Home</title>

</head>

<body class="bg-gray-100">
  <!-- Navbar -->
  <nav>


    <div class="navbar bg-base-200 px-12 shadow-sm flex flex-col md:flex-row gap-3">

      <!-- Left Side -->
      <div class="w-full md:flex-1">
        <a class="flex items-center gap-2 text-lg md:text-2xl font-semibold">
          <i class="fa-brands fa-github text-xl md:text-3xl"></i>
          GitHub Issues Tracker
        </a>
      </div>

      <!-- Right Side -->
      <div class="flex items-center gap-2 w-full md:w-auto">

        <!-- Search -->
        <div class="relative flex-1 md:flex-none">

          <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 z-50"></i>

          <input id="searchInput" type="text" placeholder="Search issues..." class="input input-sm input-bordered pl-9 text-sm md:text-base w-full md:w-56" />

        </div>

        <!-- Search Button -->
        <button id="searchBtn" class="btn btn-sm btn-primary text-white text-sm md:text-base font-semibold border-none">
          Search
        </button>

      </div>

    </div>

  </nav>

  <!-- Issues Filter Tabs -->
  <div class="container mx-auto mt-6 px-3">

    <div class="flex gap-2 bg-base-200 p-1 rounded-lg w-fit">

      <button id="allTab" class="btn btn-sm px-10 btn-primary text-sm md:text-base font-semibold">
        All
      </button>

      <button id="openTab" class="btn btn-sm btn-outline text-sm md:text-base font-medium">
        Open
      </button>

      <button id="closedTab" class="btn btn-sm btn-outline text-sm md:text-base font-medium">
        Closed
      </button>

    </div>

  </div>


  <!-- Issues header section -->
   <section class="container mx-auto mt-6">

  <div class="bg-white rounded-lg p-4 flex flex-col md:flex-row md:items-center md:justify-between gap-3">

    <!-- Left Side -->
    <div class="flex items-center gap-3">

      <div class="bg-purple-100 text-purple-600 p-2 rounded-full">
        <img src="./images/icon.png" alt="" class="h-8 w-8">
      </div>

      <div>
        <h2 id="issueCount" class="font-semibold text-lg md:text-xl">
          50 Issues
        </h2>
        <p class="text-sm md:text-base text-gray-500">
          Track and manage your project issues
        </p>
      </div>

    </div>

    <!-- Right Side -->
    <div class="flex items-center gap-5 text-sm md:text-base font-medium">

      <div class="flex items-center gap-1">
        <span class="w-2.5 h-2.5 bg-green-500 rounded-full"></span>
        <span>Open</span>
      </div>

      <div class="flex items-center gap-1">
        <span class="w-2.5 h-2.5 bg-purple-600 rounded-full"></span>
        <span>Closed</span>
      </div>

    </div>

  </div>

</section>

<div class="container mx-auto mt-6 px-3">

  <!-- Loading spinner -->
  <div id="spinner" class="flex justify-center my-10 hidden">
    <span class="loading loading-spinner loading-lg text-primary"></span>
  </div>

  <!-- Card Issue container -->
  <div id="issuesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 cursor-pointer"></div>

</div>

<!-- Modal show -->
 <dialog id="issueModal" class="modal">
  <div class="modal-box">

    <!-- Title -->
    <div class="flex justify-between items-start">
      <h3 id="modalTitle" class="font-bold text-lg"></h3>

      <form method="dialog">
        <button class="btn btn-sm btn-circle btn-ghost">✕</button>
      </form>
    </div>

    <!-- Issue info -->
   <p class="text-sm text-gray-500 mt-1 flex items-center gap-2 flex-wrap">
  
  <span id="modalStatusBadge"
        class="badge badge-success badge-sm">
  </span> •

  <span id="modalIssueId"></span>

  <span id="modalStatusText"></span> by

  <span id="modalAuthor"></span>

  •
  <span id="modalCreated"></span>

</p>

    <!-- Labels -->
    <div id="modalLabels" class="flex gap-2 mt-3"></div>

    <!-- Description -->
    <p id="modalDescription" class="mt-3 text-sm text-gray-600"></p>

    <!-- Bottom section -->
    <div class="flex justify-between items-center mt-6">

      <!-- Assignee -->
      <div>
        <p class="text-xs text-gray-500">Assignee</p>
        <p id="modalAssignee" class="font-medium"></p>
      </div>

      <!-- Priority -->
      <div>
        <p class="text-xs text-gray-500">Priority</p>
      <span id="modalPriority"
        class="badge uppercase text-red-600 bg-red-100">
      </span>
      </div>
    </div>

    <!-- Close button -->
    <div class="modal-action">
      <form method="dialog">
        <button class="btn btn-primary btn-sm">Close</button>
      </form>
    </div>

  </div>
</dialog>

<script src="./script/home.js"></script>
</body>

</html>
